<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>吃啥·学习系统</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.bootcdn.net/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
    input,textarea,select{font-size:16px!important}
    .tab-active{color:#f97316}.tab-inactive{color:#9ca3af}
    .card{border-radius:16px;transition:transform .1s}.card:active{transform:scale(.98)}
    .avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:#fff;flex-shrink:0}
    .avatar-sm{width:28px;height:28px;font-size:11px}.avatar-lg{width:48px;height:48px;font-size:18px}.avatar-xs{width:22px;height:22px;font-size:9px}
    .msg-bubble{max-width:70%;word-break:break-word;position:relative;line-height:1.5;display:inline-block}
    .msg-bubble-me{background:#95ec69;color:#000;border-radius:4px;position:relative}
    .msg-bubble-me::after{content:'';position:absolute;top:10px;right:-6px;border:6px solid transparent;border-left-color:#95ec69}
    .msg-bubble-other{background:#fff;color:#000;border-radius:4px;box-shadow:0 1px 2px rgba(0,0,0,.06);position:relative}
    .msg-bubble-other::after{content:'';position:absolute;top:10px;left:-6px;border:6px solid transparent;border-right-color:#fff}
    .msg-bubble-ai{background:#f4f4f4;color:#000;border-radius:4px;position:relative}
    .msg-bubble-ai::after{content:'';position:absolute;top:10px;left:-6px;border:6px solid transparent;border-right-color:#f4f4f4}
    .msg-bubble-ai table{width:100%;border-collapse:collapse;margin:4px 0;font-size:12px}
    .msg-bubble-ai th,.msg-bubble-ai td{border:1px solid #ddd;padding:4px 6px;text-align:left}
    .msg-bubble-ai th{background:#e8e8e8;font-weight:600}
    .msg-bubble-ai ul,.msg-bubble-ai ol{padding-left:1.2em;margin:4px 0}
    .msg-bubble-ai p{margin:2px 0}
    .msg-bubble-ai code{background:#e0e0e0;padding:1px 4px;border-radius:3px;font-size:12px}
    .msg-bubble-ai pre{background:#2d2d2d;color:#f8f8f2;padding:8px;border-radius:4px;overflow-x:auto;font-size:12px;margin:4px 0}
    .msg-bubble-ai pre code{background:none;color:inherit;padding:0}
    .typing-dots::after{content:'...';animation:dots 1.5s infinite}@keyframes dots{0%{content:'.'}33%{content:'..'}66%{content:'...'}}
    .msg-sending{width:16px;height:16px;border:2px solid #ccc;border-top-color:#999;border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0;margin-top:6px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .msg-fail{width:18px;height:18px;border-radius:50%;background:#e74c3c;color:#fff;font-size:12px;font-weight:bold;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-top:4px}
    .msg-del{position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:#ef4444;color:#fff;font-size:10px;display:none;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.2)}
    .msg-mine .msg-del{display:flex}
    .star{cursor:pointer;font-size:22px}
    .pb-safe{padding-bottom:calc(4rem + env(safe-area-inset-bottom,0px))}
    .slide-up{animation:slideUp .3s ease}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .timer-ring{transition:stroke-dashoffset 1s linear}
    .countdown-bg{background:linear-gradient(135deg,#667eea,#764ba2)}
    .seat{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;border:2px solid transparent;font-size:11px}
    .seat:hover{border-color:#f97316}.seat.mine{border-color:#10b981;box-shadow:0 0 8px rgba(16,185,129,.4)}
    .scene-bg{position:fixed;inset:0;z-index:0;transition:background .5s}
    .scene-overlay{position:fixed;inset:0;z-index:1;background:rgba(0,0,0,.25)}
    .scene-ui{position:relative;z-index:2}
    .status-btn.active{background:#f97316;color:#fff;box-shadow:0 2px 8px rgba(249,115,22,.3)}
    .pulse{animation:pulse 2s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    @keyframes drumBeat{0%,100%{transform:scale(1) rotate(0deg)}10%{transform:scale(1.2) rotate(-5deg)}20%{transform:scale(0.95) rotate(3deg)}30%{transform:scale(1.15) rotate(-3deg)}40%{transform:scale(1) rotate(0deg)}}
    .drum-beating{animation:drumBeat 0.8s ease-in-out infinite}
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
<div id="app" class="max-w-lg mx-auto min-h-screen relative">

<div id="login-page" class="min-h-screen flex flex-col items-center justify-center p-6">
  <div class="w-full max-w-sm">
    <div class="text-center mb-6"><div class="text-5xl mb-3">🍜</div><h1 class="text-2xl font-bold text-gray-800 mb-1">吃啥·学习系统</h1><p class="text-sm text-gray-400">一起加油，我们都在</p></div>
    <div class="countdown-bg rounded-2xl p-5 text-white text-center mb-6 shadow-lg">
      <p class="text-xs opacity-80">2027考研倒计时</p><p class="text-4xl font-bold my-1" id="login-countdown"></p><p class="text-xs opacity-60">2026.12.20</p>
    </div>
    <div class="grid grid-cols-3 gap-3 mb-6" id="login-users"></div>
    <div id="login-form" class="hidden">
      <input type="password" id="login-pwd" placeholder="密码" class="w-full border rounded-xl px-4 py-3 mb-3 text-center outline-none focus:ring-2 focus:ring-orange-300" style="font-size:16px">
      <button onclick="doLogin()" class="w-full bg-orange-500 text-white rounded-xl py-3 font-semibold active:bg-orange-600">登录</button>
      <p id="login-error" class="text-red-500 text-xs text-center mt-2 hidden"></p>
    </div>
  </div>
</div>

<div id="main-app" class="hidden pb-safe">
  <header class="bg-white/90 backdrop-blur sticky top-0 z-20 px-4 py-2.5 shadow-sm">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-2"><span class="text-lg">🍜</span><h1 class="text-base font-bold">吃啥</h1></div>
      <div id="header-user" class="flex items-center gap-2 cursor-pointer" onclick="showSettings()"></div>
    </div>
    <div class="text-center"><span class="text-xs font-semibold text-purple-600" id="header-countdown"></span></div>
  </header>
  <div id="panel-home" class="p-4"></div>
  <div id="panel-review" class="p-4 hidden"></div>
  <div id="panel-focus" class="p-4 hidden"></div>
  <div id="panel-chat" class="p-4 hidden"></div>
  <div id="panel-stats" class="p-4 hidden"></div>
  <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur border-t z-30 max-w-lg mx-auto">
    <div class="flex h-14">
      <button onclick="switchTab('home')" id="tab-home" class="flex-1 flex flex-col items-center justify-center tab-active"><span class="text-lg">🏠</span><span class="text-xs">首页</span></button>
      <button onclick="switchTab('review')" id="tab-review" class="flex-1 flex flex-col items-center justify-center tab-inactive"><span class="text-lg">📖</span><span class="text-xs">复习</span></button>
      <button onclick="switchTab('focus')" id="tab-focus" class="flex-1 flex flex-col items-center justify-center tab-inactive"><span class="text-lg">🍅</span><span class="text-xs">专注</span></button>
      <button onclick="switchTab('chat')" id="tab-chat" class="flex-1 flex flex-col items-center justify-center tab-inactive"><span class="text-lg">💬</span><span class="text-xs">聊天</span></button>
      <button onclick="switchTab('stats')" id="tab-stats" class="flex-1 flex flex-col items-center justify-center tab-inactive"><span class="text-lg">📊</span><span class="text-xs">统计</span></button>
    </div>
  </nav>
</div>

<div id="immersive-view" class="hidden fixed inset-0 z-40">
  <div id="scene-bg" class="scene-bg"></div><div class="scene-overlay"></div>
  <div class="scene-ui min-h-screen flex flex-col">
    <div class="flex items-center justify-between p-4">
      <button onclick="leaveStudyRoom()" class="bg-white/20 backdrop-blur text-white px-3 py-1.5 rounded-full text-sm">← 离开</button>
      <span class="bg-white/20 backdrop-blur text-white px-3 py-1.5 rounded-full text-sm" id="imm-room"></span>
      <button onclick="showScenePicker()" class="bg-white/20 backdrop-blur text-white px-3 py-1.5 rounded-full text-sm">🎨 换景</button>
    </div>
    <div class="flex-1 flex flex-col items-center justify-center">
      <div class="bg-white/10 backdrop-blur-lg rounded-3xl p-8 text-center text-white shadow-2xl">
        <p class="text-sm opacity-80 mb-1">专注学习中</p>
        <p class="text-5xl font-bold mb-1" id="imm-timer">00:00:00</p>
        <p class="text-xs opacity-60" id="imm-scene"></p>
      </div>
    </div>
    <div class="p-4">
      <div class="bg-white/10 backdrop-blur rounded-2xl p-3 mb-3"><p class="text-white text-xs opacity-70 mb-2">同在自习室：</p><div id="imm-peers" class="flex gap-2 flex-wrap"></div></div>
      <div class="bg-white/10 backdrop-blur rounded-2xl p-3">
        <div id="imm-chat-msgs" class="max-h-32 overflow-y-auto mb-2 space-y-1"></div>
        <div class="flex gap-2">
          <input id="imm-chat-input" placeholder="和小鼓聊聊 / 同室≤2人可互聊" class="flex-1 bg-white/20 text-white placeholder-white/50 rounded-full px-3 py-1.5 text-sm outline-none" style="font-size:16px" onkeydown="if(event.key==='Enter')sendImmChat()">
          <button onclick="sendImmChat()" class="bg-white/30 text-white rounded-full w-8 h-8 flex items-center justify-center text-sm">↑</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="modal" class="fixed inset-0 bg-black/40 z-50 hidden flex items-end" onclick="if(event.target===this)closeModal()">
  <div class="bg-white w-full max-w-lg mx-auto rounded-t-3xl p-6 slide-up" id="modal-content"></div>
</div>
</div>
<script>
const MEMBERS = {
  '姜荣耀': { color: '#f59e0b', goal: '考研·哲学' },
  '李雪婷': { color: '#ec4899', goal: '学校兼职' },
  '龙': { color: '#ef4444', goal: '考研·会计学' },
  '马国恒': { color: '#6366f1', goal: '考研·通信学' },
  '邱茜': { color: '#8b5cf6', goal: '考公' },
  '王朔': { color: '#10b981', goal: '考研·教育学' }
};
const STATUS_LIST = ['学习中','休息','吃饭','自由','离开','隐身'];
const SCENES = {
  '大海':{emoji:'🌊',bg:'linear-gradient(180deg,#1a3a5c,#2980b9,#6dd5fa)'},
  '大山':{emoji:'🏔️',bg:'linear-gradient(180deg,#87ceeb,#4a7c23,#2d5016)'},
  '宇宙':{emoji:'🌌',bg:'linear-gradient(180deg,#0f0c29,#302b63,#24243e)'},
  '森林':{emoji:'🌲',bg:'linear-gradient(180deg,#134e5e,#3a7d44,#71b280)'},
  '日落':{emoji:'🌅',bg:'linear-gradient(180deg,#f6d365,#ee9ca7,#764ba2)'},
  '雪景':{emoji:'❄️',bg:'linear-gradient(180deg,#e6dada,#8fa4b0,#274046)'},
  '星空':{emoji:'✨',bg:'linear-gradient(180deg,#141e30,#243b55,#0f0c29)'},
  '草原':{emoji:'🌾',bg:'linear-gradient(180deg,#87ceeb,#56ab2f,#a8e063)'}
};
let currentUser=localStorage.getItem('chisha_user'),currentTab='home';
let pomodoroInterval=null,pomodoroSeconds=25*60,pomodoroRunning=false;
let immersiveTimer=null,immersiveStart=null;
let currentRoomId=null,chatRooms=[],chatFileData=null;

function avatar(n,s=''){const m=MEMBERS[n]||{color:'#666'};const c=s==='lg'?'avatar avatar-lg':s==='sm'?'avatar avatar-sm':s==='xs'?'avatar avatar-xs':'avatar';return `<div class="${c}" style="background:${m.color}">${(n||'?')[0]}</div>`;}
function timeAgo(ts){if(!ts)return'';const d=new Date(ts.includes('Z')?ts:ts+'Z');const diff=(Date.now()-d.getTime())/60000;if(diff<1)return'刚刚';if(diff<60)return Math.floor(diff)+'分钟前';if(diff<1440)return Math.floor(diff/60)+'小时前';return d.toLocaleDateString('zh-CN',{month:'numeric',day:'numeric'});}
function today(){return new Date().toISOString().split('T')[0];}
function getCountdown(){return Math.max(0,Math.ceil((new Date('2026-12-20')-new Date())/86400000));}
function updateCountdown(){const d=getCountdown();const e1=document.getElementById('login-countdown');const e2=document.getElementById('header-countdown');if(e1)e1.textContent=d+' 天';if(e2)e2.textContent='考研还剩 '+d+' 天';}

// === AUTH ===
function initLogin(){document.getElementById('login-users').innerHTML=Object.entries(MEMBERS).map(([n,m])=>`<button onclick="selectLoginUser('${n}')" class="card bg-white p-3 shadow-sm text-center border-2 border-transparent" id="lu-${n}">${avatar(n)}<div class="font-medium text-xs mt-1">${n}</div><div class="text-xs text-gray-400">${m.goal}</div></button>`).join('');}
let selectedLoginUser=null;
function selectLoginUser(n){selectedLoginUser=n;document.querySelectorAll('[id^=lu-]').forEach(e=>e.classList.remove('border-orange-400'));document.getElementById('lu-'+n)?.classList.add('border-orange-400');document.getElementById('login-form').classList.remove('hidden');}
async function doLogin(){const pwd=document.getElementById('login-pwd').value;if(!selectedLoginUser||!pwd)return;const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:selectedLoginUser,password:pwd})});if(r.ok){currentUser=selectedLoginUser;localStorage.setItem('chisha_user',currentUser);localStorage.setItem('chisha_pwd',pwd);showMain();}else{const d=await r.json();const el=document.getElementById('login-error');el.textContent=d.error||'登录失败';el.classList.remove('hidden');}}
function logout(){localStorage.removeItem('chisha_user');currentUser=null;location.reload();}
function showMain(){document.getElementById('login-page').classList.add('hidden');document.getElementById('main-app').classList.remove('hidden');document.getElementById('header-user').innerHTML=avatar(currentUser,'sm')+`<span class="text-sm font-medium">${currentUser}</span>`;loadHome();}
function switchTab(tab){currentTab=tab;['home','review','focus','chat','stats'].forEach(t=>{document.getElementById('panel-'+t).classList.toggle('hidden',t!==tab);document.getElementById('tab-'+t).className=t===tab?'flex-1 flex flex-col items-center justify-center tab-active':'flex-1 flex flex-col items-center justify-center tab-inactive';});if(tab==='home')loadHome();else if(tab==='review')loadReview();else if(tab==='focus')loadFocus();else if(tab==='chat')loadChat();else if(tab==='stats')loadStats(7);}
function closeModal(){document.getElementById('modal').classList.add('hidden');}
function showSettings(){document.getElementById('modal').classList.remove('hidden');document.getElementById('modal-content').innerHTML=`<div class="text-center mb-4">${avatar(currentUser,'lg')}<h3 class="font-bold mt-2">${currentUser}</h3><p class="text-sm text-gray-400">${MEMBERS[currentUser]?.goal}</p></div><button onclick="closeModal();switchTab('stats')" class="w-full bg-gray-50 rounded-xl py-3 text-sm mb-2">⚙️ 设置</button><button onclick="logout()" class="w-full bg-red-50 text-red-600 rounded-xl py-3 text-sm">退出登录</button><button onclick="closeModal()" class="w-full mt-2 text-gray-400 text-sm py-2">取消</button>`;}

// === HOME TAB ===
async function loadHome(){
  const [statusRes,actRes]=await Promise.all([fetch('/api/status'),fetch(`/api/activities?member=${encodeURIComponent(currentUser)}`)]);
  const statuses=await statusRes.json(),activities=await actRes.json();
  const now=new Date().toISOString();
  const myStatus=statuses.find(s=>s.member===currentUser);
  const myCurrentStatus=(myStatus?.expires_at&&myStatus.expires_at<now)?'离开':(myStatus?.status||'离开');
  document.getElementById('panel-home').innerHTML=`
    <div class="countdown-bg rounded-2xl p-4 text-white text-center mb-4 shadow-lg">
      <p class="text-xs opacity-80">2027考研倒计时</p><p class="text-3xl font-bold my-1">${getCountdown()}<span class="text-sm font-normal ml-1">天</span></p><p class="text-xs opacity-60">每一天都算数</p>
    </div>
    <div class="card bg-white p-4 shadow-sm mb-4">
      <h3 class="text-sm font-semibold text-gray-600 mb-3">我的状态</h3>
      <div class="flex gap-2 flex-wrap">${STATUS_LIST.map(s=>`<button onclick="setStatus('${s}')" class="status-btn px-4 py-2.5 rounded-full text-sm font-medium ${s===myCurrentStatus?'active':'bg-gray-50 text-gray-600'}">${s}</button>`).join('')}</div>
    </div>
    <div class="card bg-white p-4 shadow-sm mb-4">
      <h3 class="text-sm font-semibold text-gray-600 mb-3">大家在干嘛</h3>
      <div class="grid grid-cols-3 gap-3">${Object.keys(MEMBERS).map(name=>{const s=statuses.find(x=>x.member===name)||{status:'离开'};const st=(s.expires_at&&s.expires_at<now)?'离开':s.status;if(st==='隐身')return'';const studying=st==='学习中';return`<div class="flex flex-col items-center gap-1 p-2 rounded-xl ${studying?'bg-green-50':''}"><div class="relative">${avatar(name,'sm')}${studying?'<div class="absolute -bottom-0.5 -right-0.5 w-2.5 h-2.5 bg-green-400 rounded-full border-2 border-white pulse"></div>':''}</div><span class="text-xs font-medium">${name}</span><span class="text-xs ${studying?'text-green-600 font-semibold':'text-gray-400'}">${st}</span></div>`;}).filter(Boolean).join('')}</div>
    </div>
    <div class="flex items-center justify-between mb-3"><h3 class="text-sm font-semibold text-gray-600">最近活动</h3><button onclick="showCreateActivity()" class="bg-orange-500 text-white text-xs px-3 py-1.5 rounded-full">+ 发起</button></div>
    <div id="activities-list">${activities.length===0?'<p class="text-center text-gray-400 text-sm py-4">暂无活动</p>':activities.slice(0,10).map(a=>activityCard(a)).join('')}</div>`;
}
function activityCard(a){const typeMap={eat:'🍜约饭',study:'📚学习',free:'🎮自由'};const colorMap={eat:'border-l-orange-400',study:'border-l-blue-400',free:'border-l-green-400'};const isJoined=a.participants.includes(currentUser);const isOpen=a.status==='open';const isCreator=a.creator===currentUser;const v=a.votes||{support:0,decline:0};const myVote=a.myVote;return`<div class="card bg-white p-3 shadow-sm mb-2 border-l-4 ${colorMap[a.type]||'border-l-gray-300'}"><div class="flex justify-between items-center mb-1"><span class="text-xs font-medium">${typeMap[a.type]||a.type}</span><span class="text-xs text-gray-400">${timeAgo(a.created_at)}</span></div><p class="font-medium text-sm mb-1">${a.title}</p>${a.time_slot?`<p class="text-xs text-gray-500 mb-1">⏰ ${a.time_slot}</p>`:''}<div class="flex items-center gap-1 mb-2">${a.participants.map(p=>avatar(p,'sm')).join('')}<span class="text-xs text-gray-400 ml-1">${a.participants.length}人参与</span></div>${isOpen?`<div class="flex items-center gap-2 flex-wrap">${!isCreator?`<button data-vote-id="${a.id}" data-vote="support" onclick="voteAct(${a.id},'support')" class="text-xs ${myVote==='support'?'bg-green-500 text-white':'bg-green-50 text-green-600 border border-green-200'} rounded-lg px-3 py-1">👍 支持${v.support?'('+v.support+')':''}</button><button data-vote-id="${a.id}" data-vote="decline" onclick="voteAct(${a.id},'decline')" class="text-xs ${myVote==='decline'?'bg-red-400 text-white':'bg-red-50 text-red-500 border border-red-200'} rounded-lg px-3 py-1">🙏 婉拒${v.decline?'('+v.decline+')':''}</button>`:''}<span class="text-xs text-gray-400">${v.support+v.decline>0?'匿名投票 '+(v.support+v.decline)+'票':''}</span>${!isJoined&&!isCreator?`<button onclick="joinAct(${a.id})" class="text-xs bg-orange-50 text-orange-600 border border-orange-200 rounded-lg px-3 py-1">我也去</button>`:''}${isJoined&&!isCreator?`<button onclick="leaveAct(${a.id})" class="text-xs bg-gray-50 text-gray-500 border rounded-lg px-3 py-1">不去了</button>`:''}${isCreator?`<button onclick="closeAct(${a.id})" class="text-xs bg-gray-100 text-gray-500 rounded-lg px-3 py-1">结束</button>`:''}</div>`:'<span class="text-xs text-gray-400">已结束</span>'+(isCreator?` <button onclick="deleteAct(${a.id})" class="text-xs text-red-400 ml-2">删除</button>`:'')}</div>`;}

async function setStatus(s){await fetch('/api/status',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({member:currentUser,status:s})});loadHome();}
async function voteAct(id,vote){
  // 乐观更新：立即更新UI
  const btns=document.querySelectorAll(`[data-vote-id="${id}"]`);
  btns.forEach(btn=>{
    const bv=btn.dataset.vote;
    if(bv===vote){btn.classList.add(vote==='support'?'bg-green-500':'bg-red-400');btn.classList.add('text-white');btn.classList.remove(vote==='support'?'bg-green-50':'bg-red-50',vote==='support'?'text-green-600':'text-red-500');}
    else{btn.classList.remove('bg-green-500','bg-red-400','text-white');btn.classList.add(bv==='support'?'bg-green-50':'bg-red-50',bv==='support'?'text-green-600':'text-red-500');}
  });
  await fetch(`/api/activities/${id}/vote`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({member:currentUser,vote})});
  loadHome();
}
async function joinAct(id){await fetch(`/api/activities/${id}/join`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({member:currentUser})});loadHome();}
async function leaveAct(id){await fetch(`/api/activities/${id}/leave`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({member:currentUser})});loadHome();}

  const seats=await seatsRes.json();
  const roomsRes=await fetch('/api/study-rooms');
  const rooms=await roomsRes.json();
  const room=rooms.find(r=>r.id===roomId);
  document.getElementById('panel-room').innerHTML=`
    <div class="flex items-center gap-2 mb-4"><button onclick="loadStudyRooms()" class="text-gray-500">←</button><h3 class="font-semibold">${room.name}</h3><span class="text-xs text-gray-400">${room.total_seats}个座位</span></div>
    <div class="grid grid-cols-5 gap-2 mb-4">${seats.map(s=>{
      const occupied=s.member&&s.member!=='';
      const isMine=s.member===currentUser;
      const scene=SCENES[s.scene]||SCENES['大海'];
      return`<div class="seat ${isMine?'mine':''} ${occupied?'bg-gray-100':'bg-white border border-gray-200'}" onclick="${occupied&&!isMine?'':`pickSeat(${roomId},${s.seat_number})`}" title="${occupied?s.member+'·'+s.scene:'空座'}">
        ${occupied?`<div class="text-center">${avatar(s.member,'xs')}<div class="text-xs mt-0.5">${scene.emoji}</div></div>`:`<span class="text-gray-300 text-lg">${s.seat_number}</span>`}
      </div>`;
    }).join('')}</div>
    <div class="text-xs text-gray-400 text-center">点击空座入座 · 选择你喜欢的风景开始学习</div>`;
}

async function sitDown(roomId,seatNum,scene){
  const r=await fetch(`/api/study-rooms/${roomId}/sit`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({member:currentUser,seat_number:seatNum,scene})});
  if(!r.ok){const d=await r.json();alert(d.error);return;}
  closeModal();
  // Get room name
  const roomsRes=await fetch('/api/study-rooms');
  const rooms=await roomsRes.json();
  const room=rooms.find(x=>x.id===roomId);
  enterImmersive(room?.name||'自习室',scene,new Date().toISOString());
}

function enterImmersive(roomName,scene,startTime){
  document.getElementById('immersive-view').classList.remove('hidden');
  document.getElementById('main-app').classList.add('hidden');
  document.getElementById('scene-bg').style.background=SCENES[scene]?.bg||SCENES['大海'].bg;
  document.getElementById('imm-room').textContent=roomName;
  document.getElementById('imm-scene').textContent=(SCENES[scene]?.emoji||'🌊')+' '+scene;
  immersiveStart=new Date(startTime);
  updateImmersiveTimer();
  immersiveTimer=setInterval(updateImmersiveTimer,1000);
  loadImmersivePeers();
}

function updateImmersiveTimer(){
  const diff=Math.floor((Date.now()-immersiveStart.getTime())/1000);
  const h=Math.floor(diff/3600),m=Math.floor((diff%3600)/60),s=diff%60;
  document.getElementById('imm-timer').textContent=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

async function loadImmersivePeers(){
  const mySeatRes=await fetch(`/api/study-rooms/my-seat?member=${encodeURIComponent(currentUser)}`);
  const mySeat=await mySeatRes.json();
  if(!mySeat.seated)return;
  const seatsRes=await fetch(`/api/study-rooms/${mySeat.room_id}/seats`);
  const seats=await seatsRes.json();
  const peers=seats.filter(s=>s.member&&s.member!==currentUser);
  document.getElementById('imm-peers').innerHTML=peers.length?peers.map(s=>`<div class="flex items-center gap-1 bg-white/20 rounded-full px-2 py-1">${avatar(s.member,'xs')}<span class="text-white text-xs">${s.member}</span><span class="text-xs opacity-60">${SCENES[s.scene]?.emoji||''}</span></div>`).join(''):'<span class="text-white/60 text-xs">暂时只有你一个人</span>';
}

async function leaveStudyRoom(){
  await fetch('/api/study-rooms/leave',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({member:currentUser})});
  clearInterval(immersiveTimer);
  document.getElementById('immersive-view').classList.add('hidden');
  document.getElementById('main-app').classList.remove('hidden');
  loadStudyRooms();
}

// === IMMERSIVE CHAT (自习室内聊天) ===
let immChatHistory=[];
async function sendImmChat(){
  const input=document.getElementById('imm-chat-input');
  const text=input.value.trim();
  if(!text)return;
  input.value='';
  
  // Add user message to display
  immChatHistory.push({sender:currentUser,text});
  renderImmChat();
  
  // Get peers to determine if we can chat with others
  const mySeatRes=await fetch(`/api/study-rooms/my-seat?member=${encodeURIComponent(currentUser)}`);
  const mySeat=await mySeatRes.json();
  if(!mySeat.seated)return;
  const seatsRes=await fetch(`/api/study-rooms/${mySeat.room_id}/seats`);
  const seats=await seatsRes.json();
  const occupiedSeats=seats.filter(s=>s.member&&s.member!=='');
  
  // Always call AI (小鼓)
  const aiMessages=immChatHistory.slice(-10).map(m=>({
    role:m.sender==='小鼓'?'assistant':'user',
    content:m.sender==='小鼓'?m.text:`${m.sender}说：${m.text}`
  }));
  
  // Show thinking
  immChatHistory.push({sender:'小鼓',text:'思考中...',thinking:true});
  renderImmChat();
  
  try{
    const r=await fetch('/api/study-rooms/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({member:currentUser,message:text,history:immChatHistory.filter(m=>!m.thinking)})});
    const data=await r.json();
    immChatHistory=immChatHistory.filter(m=>!m.thinking);
    if(data.reply){
      immChatHistory.push({sender:'小鼓',text:data.reply});
    }
  }catch(e){
    immChatHistory=immChatHistory.filter(m=>!m.thinking);
    immChatHistory.push({sender:'小鼓',text:'网络不太好，稍后再试~'});
  }
  renderImmChat();
}

function renderImmChat(){
  const container=document.getElementById('imm-chat-msgs');
  container.innerHTML=immChatHistory.slice(-8).map(m=>{
    const isMe=m.sender===currentUser;
    const isAI=m.sender==='小鼓';
    if(isMe)return`<div class="flex justify-end"><div class="bg-white/30 text-white rounded-xl px-2.5 py-1 text-xs max-w-[70%]">${m.text}</div></div>`;
    if(isAI)return`<div class="flex gap-1 items-start"><span class="text-xs">🤖</span><div class="bg-white/20 text-white rounded-xl px-2.5 py-1 text-xs max-w-[70%] ${m.thinking?'opacity-50 italic':''}">${m.text}</div></div>`;
    return`<div class="flex gap-1 items-start"><span class="text-xs">${avatar(m.sender,'xs')}</span><div class="bg-white/20 text-white rounded-xl px-2.5 py-1 text-xs max-w-[70%]"><span class="opacity-60">${m.sender}:</span> ${m.text}</div></div>`;
  }).join('');
  container.scrollTop=container.scrollHeight;
}

let ckType='study',ckRating=0;
function setCkType(t){ckType=t;['study','eat','free'].forEach(x=>{const el=document.getElementById('ck-'+x);el.className=x===t?'flex-1 py-2 rounded-lg text-xs border-2 '+(x==='study'?'border-blue-300 bg-blue-50 text-blue-700':x==='eat'?'border-orange-300 bg-orange-50 text-orange-700':'border-green-300 bg-green-50 text-green-700'):'flex-1 py-2 rounded-lg text-xs border-2 border-transparent bg-gray-100';});const sf=document.getElementById('ck-study-fields');if(sf)sf.style.display=t==='study'?'block':'none';}
function setRating(n){ckRating=n;for(let i=1;i<=5;i++)document.getElementById('star-'+i).className='star '+(i<=n?'text-yellow-400':'text-gray-300');}

function resetPomodoro(){clearInterval(pomodoroInterval);pomodoroRunning=false;pomodoroSeconds=25*60;updateTimerDisplay();const btn=document.getElementById('pomo-btn');if(btn)btn.textContent='开始';stopDrum();resetDrumUI();}
function tickPomodoro(){pomodoroSeconds--;if(pomodoroSeconds<=0){clearInterval(pomodoroInterval);pomodoroRunning=false;pomodoroSeconds=25*60;stopDrum();drumFinish();if(confirm('🍅 番茄完成！记录25分钟学习？')){fetch('/api/checkins',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({member:currentUser,type:'study',duration_min:25,note:'番茄钟',study_content:'',rating:0})});}updateTimerDisplay();return;}updateTimerDisplay();}

// 微信风格时间分隔：间隔>5分钟显示时间条
function formatMsgTime(dateStr){
  const d=new Date(dateStr+'Z');// DB存的是UTC
  const now=new Date();
  const bjNow=new Date(now.toLocaleString('en-US',{timeZone:'Asia/Shanghai'}));
  const bjD=new Date(d.toLocaleString('en-US',{timeZone:'Asia/Shanghai'}));
  const hm=bjD.getHours().toString().padStart(2,'0')+':'+bjD.getMinutes().toString().padStart(2,'0');
  const todayStart=new Date(bjNow);todayStart.setHours(0,0,0,0);
  const msgDay=new Date(bjD);msgDay.setHours(0,0,0,0);
  const diffDays=Math.round((todayStart-msgDay)/(86400000));
  if(diffDays===0)return hm;
  if(diffDays===1)return`昨天 ${hm}`;
  if(diffDays<7){const weekdays=['周日','周一','周二','周三','周四','周五','周六'];return`${weekdays[bjD.getDay()]} ${hm}`;}
  return`${bjD.getFullYear()}/${(bjD.getMonth()+1).toString().padStart(2,'0')}/${bjD.getDate().toString().padStart(2,'0')} ${hm}`;
}
function shouldShowTime(prev,curr){
  if(!prev)return true;
  const t1=new Date(prev+'Z').getTime();const t2=new Date(curr+'Z').getTime();
  return(t2-t1)>5*60*1000;
}

async function loadRoomMessages(roomId){
  const r=await fetch(`/api/rooms/${roomId}/messages?member=${encodeURIComponent(currentUser)}`);
  const msgs=await r.json();
  const container=document.getElementById('chat-messages');
  if(!container)return;
  let html='';
  msgs.forEach((m,i)=>{
    if(shouldShowTime(i>0?msgs[i-1].created_at:null,m.created_at)){
      html+=`<div class="text-center text-xs text-gray-400 py-2">${formatMsgTime(m.created_at)}</div>`;
    }
    const isMe=m.sender===currentUser;
    const isAI=m.is_ai||m.sender==='小鼓';
    let text=m.content;
    if(m.is_encrypted&&m.iv){try{text=decryptMsg(m.content,m.iv,currentRoomId);}catch(e){text='🔒 加密消息';}}
    try{const p=JSON.parse(text);if(p&&p.file){const isImg=p.isImage||p.file.match(/\.(jpg|jpeg|png|gif|webp)$/i);text=(isImg?`<img src="${p.file}" class="max-w-48 rounded-lg mb-1 cursor-pointer" onclick="window.open('${p.file}')">`:`<a href="${p.file}" target="_blank" class="text-blue-500 underline text-xs">📎 ${p.fileName||'文件'}</a>`)+(p.text?`<div class="mt-1">${p.text}</div>`:'');}}catch(e){}
    if(isMe){html+=`<div class="flex justify-end gap-2 items-start"><div class="msg-bubble msg-bubble-me msg-mine px-3 py-2 text-sm"><span onclick="deleteMsg(${roomId},${m.id})" class="msg-del">×</span>${text}</div>${avatar(currentUser,'sm')}</div>`;}
    else if(isAI){const rendered=typeof marked!=='undefined'?marked.parse(text):text;html+=`<div class="flex gap-2 items-start"><div class="avatar avatar-sm" style="background:#666">🤖</div><div class="msg-bubble msg-bubble-ai px-3 py-2 text-sm">${rendered}</div></div>`;}
    else{html+=`<div class="flex gap-2 items-start">${avatar(m.sender,'sm')}<div style="min-width:0;flex:1"><div class="text-xs text-gray-500 mb-0.5">${m.sender}</div><div class="msg-bubble msg-bubble-other px-3 py-2 text-sm">${text}</div></div></div>`;}
  });
  container.innerHTML=html;
  container.scrollTop=container.scrollHeight;
}

// File upload with image compression
function compressImage(dataUrl,maxSize,quality){return new Promise(resolve=>{const img=new Image();img.onload=()=>{let w=img.width,h=img.height;if(w>maxSize||h>maxSize){const ratio=Math.min(maxSize/w,maxSize/h);w=Math.round(w*ratio);h=Math.round(h*ratio);}const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;canvas.getContext('2d').drawImage(img,0,0,w,h);resolve(canvas.toDataURL('image/jpeg',quality));};img.src=dataUrl;});}
function handleChatFile(input){const file=input.files[0];if(!file)return;const reader=new FileReader();reader.onload=async(e)=>{let dataUrl=e.target.result;const isImage=file.type.startsWith('image/');if(isImage){dataUrl=await compressImage(dataUrl,800,0.6);}chatFileData={type:isImage?'image':'file',name:file.name,dataUrl,mime:isImage?'image/jpeg':file.type};document.getElementById('chat-preview').classList.remove('hidden');if(isImage){document.getElementById('chat-preview-img').src=dataUrl;document.getElementById('chat-preview-img').classList.remove('hidden');document.getElementById('chat-preview-file').classList.add('hidden');}else{document.getElementById('chat-preview-img').classList.add('hidden');document.getElementById('chat-preview-file').classList.remove('hidden');document.getElementById('chat-preview-filename').textContent=file.name;}};reader.readAsDataURL(file);}
function clearChatFile(){chatFileData=null;document.getElementById('chat-preview').classList.add('hidden');document.getElementById('chat-preview-img').classList.add('hidden');document.getElementById('chat-preview-file').classList.add('hidden');document.getElementById('chat-file-input').value='';}

async function sendRoomMsg(){
  const input=document.getElementById('chat-input');
  const content=input.value.trim();
  if(!content&&!chatFileData)return;
  if(!currentRoomId)return;
  input.value='';
  const container=document.getElementById('chat-messages');

  // 乐观更新：立即显示自己的消息
  let displayContent=content;
  let fileUrl=null,fileName=null;
  if(chatFileData){const uploadRes=await fetch('/api/upload-chat-file',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({data:chatFileData.dataUrl,name:chatFileData.name,mime:chatFileData.mime,member:currentUser})});const uploadData=await uploadRes.json();if(uploadData.error){alert(uploadData.error);return;}fileUrl=uploadData.url;fileName=chatFileData.name;clearChatFile();}
  let sendContent=content;
  if(fileUrl){sendContent=JSON.stringify({text:content,file:fileUrl,fileName,isImage:fileUrl.match(/\.(jpg|jpeg|png|gif|webp)$/i)?true:false});displayContent=fileUrl.match(/\.(jpg|jpeg|png|gif|webp)$/i)?`<img src="${fileUrl}" class="max-w-48 rounded-lg">`+(content?`<div class="mt-1">${content}</div>`:''):`📎 ${fileName}`+(content?` ${content}`:'');}

  // 立即显示自己的消息 + 发送中旋转圈
  const msgId='msg_'+Date.now();
  container.innerHTML+=`<div id="${msgId}" class="flex justify-end gap-1.5 items-start"><div id="${msgId}_status" class="msg-sending"></div><div class="msg-bubble msg-bubble-me msg-mine px-3 py-2 text-sm">${displayContent}</div>${avatar(currentUser,'sm')}</div>`;
  container.scrollTop=container.scrollHeight;

  try{
    // 发送请求
    const res=await fetch(`/api/rooms/${currentRoomId}/messages`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sender:currentUser,content:sendContent,iv:'',is_encrypted:false,call_ai:!!(chatRooms.find(r=>r.id===currentRoomId)?.include_ai)})});
    if(!res.ok)throw new Error('发送失败');
    const data=await res.json();

    // 发送成功：移除旋转圈
    const statusEl=document.getElementById(msgId+'_status');
    if(statusEl)statusEl.remove();

    // 如果有AI回复，显示"正在输入"已经不需要了，直接显示
    if(data.aiMsg){
      const rendered=typeof marked!=='undefined'?marked.parse(data.aiMsg.content):data.aiMsg.content;
      container.innerHTML+=`<div class="flex gap-2 items-start"><div class="avatar avatar-sm" style="background:#666">🤖</div><div class="msg-bubble msg-bubble-ai px-3 py-2 text-sm">${rendered}</div></div>`;
      container.scrollTop=container.scrollHeight;
    }
  }catch(e){
    // 发送失败：旋转圈变红色感叹号
    const statusEl=document.getElementById(msgId+'_status');
    if(statusEl){
      statusEl.className='msg-fail';
      statusEl.innerHTML='!';
      statusEl.title='发送失败，点击重发';
      statusEl.onclick=()=>{statusEl.closest('[id^=msg_]').remove();sendContent_retry=sendContent;retryRoomMsg(sendContent);};
    }
  }
}
// 重发消息
async function retryRoomMsg(sendContent){
  const container=document.getElementById('chat-messages');
  const msgId='msg_'+Date.now();
  container.innerHTML+=`<div id="${msgId}" class="flex justify-end gap-1.5 items-start"><div id="${msgId}_status" class="msg-sending"></div><div class="msg-bubble msg-bubble-me msg-mine px-3 py-2 text-sm">重发中...</div>${avatar(currentUser,'sm')}</div>`;
  container.scrollTop=container.scrollHeight;
  try{
    const res=await fetch(`/api/rooms/${currentRoomId}/messages`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sender:currentUser,content:sendContent,iv:'',is_encrypted:false,call_ai:!!(chatRooms.find(r=>r.id===currentRoomId)?.include_ai)})});
    if(!res.ok)throw new Error('fail');
    document.getElementById(msgId)?.remove();
    loadRoomMessages(currentRoomId);

    const statusEl=document.getElementById(msgId+'_status');
    if(statusEl){statusEl.className='msg-fail';statusEl.innerHTML='!';statusEl.title='发送失败';}
  }
}

// Encryption (kept for compatibility)
function getRoomKey(roomId){const pwd=localStorage.getItem('chisha_pwd')||'';const raw=`chisha_e2e_${roomId}_${pwd}_salt2024`;let hash=0;for(let i=0;i<raw.length;i++){hash=((hash<<5)-hash)+raw.charCodeAt(i);hash|=0;}const key=new Array(32);for(let i=0;i<32;i++){key[i]=((hash*(i+1)*7919)>>>0)%256;}return key;}
function encryptMsg(plaintext,roomId){const key=getRoomKey(roomId);const iv=Array.from({length:16},()=>Math.floor(Math.random()*256));const textBytes=new TextEncoder().encode(plaintext);const cipher=new Uint8Array(textBytes.length);for(let i=0;i<textBytes.length;i++){cipher[i]=textBytes[i]^key[i%32]^iv[i%16];}return{ciphertext:btoa(String.fromCharCode(...cipher)),iv:btoa(String.fromCharCode(...iv))};}
function decryptMsg(cipherB64,ivB64,roomId){const key=getRoomKey(roomId);const cipher=Uint8Array.from(atob(cipherB64),c=>c.charCodeAt(0));const iv=Uint8Array.from(atob(ivB64),c=>c.charCodeAt(0));const plain=new Uint8Array(cipher.length);for(let i=0;i<cipher.length;i++){plain[i]=cipher[i]^key[i%32]^iv[i%16];}return new TextDecoder().decode(plain);}

async function createPrivateChat(other){const r=await fetch('/api/rooms',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({creator:currentUser,name:`${currentUser}与${other}`,type:'private',members:[currentUser,other]})});const data=await r.json();closeModal();currentRoomId=data.id;const rr=await fetch(`/api/rooms?member=${encodeURIComponent(currentUser)}`);chatRooms=await rr.json();showRoom(data.id);}
function showNewGroupChat(){document.getElementById('modal').classList.remove('hidden');const others=Object.keys(MEMBERS).filter(n=>n!==currentUser);document.getElementById('modal-content').innerHTML=`<h3 class="font-bold mb-3">创建群聊</h3><input id="group-name" placeholder="群名称" class="w-full border rounded-lg px-3 py-2 text-sm mb-3" style="font-size:16px"><p class="text-xs text-gray-500 mb-2">选择成员：</p><div class="grid grid-cols-2 gap-2 mb-3">${others.map(name=>`<label class="flex items-center gap-2 bg-gray-50 rounded-lg p-2 cursor-pointer"><input type="checkbox" value="${name}" class="group-member-cb">${avatar(name,'sm')}<span class="text-sm">${name}</span></label>`).join('')}</div><label class="flex items-center gap-2 bg-orange-50 rounded-lg p-2 mb-3 cursor-pointer"><input type="checkbox" id="invite-ai-cb" checked><div class="avatar avatar-sm" style="background:#666">🤖</div><span class="text-sm">小鼓</span></label><div class="flex gap-2"><button onclick="closeModal()" class="flex-1 border rounded-lg py-2 text-sm">取消</button><button onclick="createGroupChat()" class="flex-1 bg-orange-500 text-white rounded-lg py-2 text-sm font-semibold">创建</button></div>`;}
async function createGroupChat(){const name=document.getElementById('group-name').value.trim();if(!name)return alert('请输入群名称');const checked=[...document.querySelectorAll('.group-member-cb:checked')].map(cb=>cb.value);if(checked.length===0)return alert('至少选一个成员');const members=[currentUser,...checked];const includeAI=document.getElementById('invite-ai-cb')?.checked;const r=await fetch('/api/rooms',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({creator:currentUser,name,type:'group',members,include_ai:includeAI})});const data=await r.json();closeModal();currentRoomId=data.id;const rr=await fetch(`/api/rooms?member=${encodeURIComponent(currentUser)}`);chatRooms=await rr.json();showRoom(data.id);}

// === STATS TAB ===
let statsDays=7;
async function loadStats(days){
  statsDays=days||statsDays;
  const [statsRes,streaksRes]=await Promise.all([fetch(`/api/stats?days=${statsDays}&member=${encodeURIComponent(currentUser)}`),fetch('/api/streaks')]);
  const stats=await statsRes.json(),streaks=await streaksRes.json();
  const byMember={};for(const row of stats){if(!byMember[row.member])byMember[row.member]={};byMember[row.member][row.type]={min:row.total_min,rating:row.avg_rating};}
  document.getElementById('panel-stats').innerHTML=`
    <div class="flex gap-2 mb-4">
      <button onclick="loadStats(7)" class="px-4 py-1.5 rounded-full text-sm font-medium ${statsDays===7?'bg-orange-500 text-white':'bg-gray-100 text-gray-600'}">近7天</button>
      <button onclick="loadStats(30)" class="px-4 py-1.5 rounded-full text-sm font-medium ${statsDays===30?'bg-orange-500 text-white':'bg-gray-100 text-gray-600'}">近30天</button>
    </div>
    <h3 class="text-sm font-semibold text-gray-600 mb-3">学习统计</h3>
    ${Object.keys(MEMBERS).map(name=>{const s=byMember[name]||{};const study=s.study?.min||0;const eat=s.eat?.min||0;const free=s.free?.min||0;const total=study+eat+free;const rating=s.study?.rating;return`<div class="card bg-white p-3 shadow-sm mb-2"><div class="flex items-center gap-2 mb-2">${avatar(name,'sm')}<span class="text-sm font-medium flex-1">${name}</span>${rating?`<span class="text-xs text-yellow-500">${'★'.repeat(Math.round(rating))} ${rating}</span>`:''}</div>${total>0?`<div class="flex h-2.5 rounded-full overflow-hidden bg-gray-100 mb-1">${study?`<div class="bg-blue-400" style="width:${study/total*100}%"></div>`:''}${eat?`<div class="bg-orange-400" style="width:${eat/total*100}%"></div>`:''}${free?`<div class="bg-green-400" style="width:${free/total*100}%"></div>`:''}</div><div class="flex gap-3 text-xs text-gray-500"><span>📚${(study/60).toFixed(1)}h</span><span>🍜${(eat/60).toFixed(1)}h</span><span>🎮${(free/60).toFixed(1)}h</span></div>`:'<p class="text-xs text-gray-400">暂无记录</p>'}</div>`;}).join('')}
    <h3 class="text-sm font-semibold text-gray-600 mt-4 mb-3">🔥 连续打卡</h3>
    <div class="card bg-white p-4 shadow-sm mb-4">${streaks.map(s=>`<div class="flex items-center justify-between py-2"><div class="flex items-center gap-2">${avatar(s.member,'sm')}<span class="text-sm">${s.member}</span></div><span class="text-sm font-bold ${s.current_streak>=7?'text-orange-500':'text-gray-500'}">🔥${s.current_streak}天</span></div>`).join('')}</div>
    <h3 class="text-sm font-semibold text-gray-600 mt-4 mb-3">设置</h3>
    <div class="card bg-white p-4 shadow-sm">
      <details><summary class="text-sm cursor-pointer">修改密码</summary><div class="mt-3"><input id="old-pwd" type="password" placeholder="原密码" class="w-full border rounded-lg px-3 py-2 text-sm mb-2" style="font-size:16px"><input id="new-pwd" type="password" placeholder="新密码" class="w-full border rounded-lg px-3 py-2 text-sm mb-2" style="font-size:16px"><button onclick="changePwd()" class="w-full bg-orange-500 text-white rounded-lg py-2 text-sm">确认修改</button><p id="pwd-msg" class="text-xs mt-1 hidden"></p></div></details>
      <button onclick="logout()" class="w-full mt-3 bg-red-50 text-red-600 rounded-lg py-2 text-sm">退出登录</button>
    </div>`;
}
async function changePwd(){const oldP=document.getElementById('old-pwd').value;const newP=document.getElementById('new-pwd').value;if(!oldP||!newP)return;const r=await fetch('/api/change-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:currentUser,oldPassword:oldP,newPassword:newP})});const msg=document.getElementById('pwd-msg');if(r.ok){msg.textContent='修改成功';msg.className='text-xs mt-1 text-green-600';localStorage.setItem('chisha_pwd',newP);}else{const d=await r.json();msg.textContent=d.error;msg.className='text-xs mt-1 text-red-500';}msg.classList.remove('hidden');}

// === INIT ===
function init(){updateCountdown();if(currentUser){showMain();}else{initLogin();}}
init();
</script>
